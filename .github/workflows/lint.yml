name: Lint

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm -r lint
