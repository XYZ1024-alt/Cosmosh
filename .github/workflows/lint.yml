name: Lint

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          pnpm --version
      - name: Test release asset preparation
        run: node --test scripts/prepare-release-assets.test.mjs
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm -r lint
      - name: Run renderer tests
        run: pnpm --filter @cosmosh/renderer test:ssh
      - name: Run backend tests
        run: pnpm --filter @cosmosh/backend test:ssh-session
