name: Build Main

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-main:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            buildArgs: --linux AppImage deb zip
          - os: windows-latest
            platform: win
            buildArgs: --win nsis zip
          - os: macos-latest
            platform: mac-x64
            buildArgs: --mac dmg zip --x64
          - os: macos-latest
            platform: mac-arm64
            buildArgs: --mac dmg zip --arm64
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          pnpm --version
      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            .cache/electron
            .cache/electron-builder
          key: ${{ runner.os }}-${{ matrix.platform }}-electron-${{ hashFiles('pnpm-lock.yaml', 'packages/main/package.json', 'packages/main/electron-builder.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-electron-
            ${{ runner.os }}-electron-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build main
        env:
          COSMOSH_ENFORCE_GLIBC_BASELINE: ${{ matrix.platform == 'linux' && '1' || '0' }}
          COSMOSH_MAX_GLIBC_VERSION: 2.35
          COSMOSH_REQUIRED_PRISMA_TARGETS: ${{ matrix.platform == 'linux' && 'debian-openssl-1.1.x,debian-openssl-3.0.x' || '' }}
        run: node packages/main/scripts/package-ci.cjs ${{ matrix.buildArgs }}

      - name: Upload Windows portable zip
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v7
        with:
          name: cosmosh-main-windows-portable-zip
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.zip

      - name: Upload Windows installer exe
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v7
        with:
          name: cosmosh-main-windows-installer-exe
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.exe
            !packages/main/release/**/win-unpacked/**

      - name: Upload Linux portable zip
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: cosmosh-main-linux-portable-zip
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.zip

      - name: Upload Linux AppImage installer
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: cosmosh-main-linux-installer-appimage
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.AppImage

      - name: Upload Linux deb installer
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v7
        with:
          name: cosmosh-main-linux-installer-deb
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.deb

      - name: Upload macOS x64 artifacts
        if: matrix.platform == 'mac-x64'
        uses: actions/upload-artifact@v7
        with:
          name: cosmosh-main-macos-x64
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.dmg
            packages/main/release/**/*.zip

      - name: Upload macOS arm64 artifacts
        if: matrix.platform == 'mac-arm64'
        uses: actions/upload-artifact@v7
        with:
          name: cosmosh-main-macos-arm64
          retention-days: 14
          if-no-files-found: warn
          path: |
            packages/main/release/**/*.dmg
            packages/main/release/**/*.zip
