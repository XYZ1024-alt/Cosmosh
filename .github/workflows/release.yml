name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: packages/remote-bootstrap/go.mod
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build remote bootstrap release assets
        env:
          COSMOSH_REMOTE_BOOTSTRAP_RELEASE_TAG: ${{ github.ref_name }}
        run: node scripts/build-remote-bootstrap-release.mjs
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
      - name: Upload remote bootstrap release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            packages/remote-bootstrap/dist/cosmosh-remote-bootstrap-linux-amd64
            packages/remote-bootstrap/dist/cosmosh-remote-bootstrap-linux-arm64
            packages/remote-bootstrap/dist/cosmosh-remote-bootstrap-manifest.json

  build-release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSMOSH_REMOTE_BOOTSTRAP_MANIFEST_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/cosmosh-remote-bootstrap-manifest.json
          COSMOSH_ENFORCE_GLIBC_BASELINE: ${{ matrix.os == 'ubuntu-22.04' && '1' || '0' }}
          COSMOSH_MAX_GLIBC_VERSION: 2.35
          COSMOSH_REQUIRED_PRISMA_TARGETS: ${{ matrix.os == 'ubuntu-22.04' && 'debian-openssl-1.1.x,debian-openssl-3.0.x' || '' }}
        run: pnpm --filter @cosmosh/main build
