name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true

  build-release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSMOSH_ENFORCE_GLIBC_BASELINE: ${{ matrix.os == 'ubuntu-22.04' && '1' || '0' }}
          COSMOSH_MAX_GLIBC_VERSION: 2.35
          COSMOSH_REQUIRED_PRISMA_TARGETS: ${{ matrix.os == 'ubuntu-22.04' && 'debian-openssl-1.1.x,debian-openssl-3.0.x' || '' }}
        run: pnpm --filter @cosmosh/main build
