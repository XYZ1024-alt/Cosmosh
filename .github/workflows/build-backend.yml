name: Build Backend

permissions:
  contents: read

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.0 --activate
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build backend
        run: pnpm --filter @cosmosh/backend build
      - name: Test SSH session bootstrap
        run: pnpm --filter @cosmosh/backend test:ssh-session
