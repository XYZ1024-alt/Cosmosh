  /api/v1/local-terminals/profiles:
    get:
      tags:
        - local-terminal
      summary: List local terminal profiles available on host.
      operationId: localTerminalListProfiles
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Local terminal profiles listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalTerminalProfileListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/local-terminals/sessions:
    post:
      tags:
        - local-terminal
      summary: Create a live local terminal session.
      operationId: localTerminalCreateSession
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalTerminalSessionCreateRequest'
      responses:
        '200':
          description: Local terminal session is ready for websocket streaming.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalTerminalSessionCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Profile not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/local-terminals/sessions/{sessionId}:
    delete:
      tags:
        - local-terminal
      summary: Close a live local terminal session.
      operationId: localTerminalCloseSession
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session closed.
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
components:
  securitySchemes:
    CosmoshInternalToken:
      type: apiKey
      in: header
      name: x-cosmosh-internal-token
  parameters:
    LocaleHeader:
      name: x-cosmosh-locale
      in: header
      required: false
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum: ['ok']
        timestamp:
          type: string
          format: date-time
    ApiMeta:
      type: object
      required:
        - code
        - message
        - requestId
        - timestamp
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
    ApiError:
      allOf:
        - $ref: '#/components/schemas/ApiMeta'
        - type: object
          required:
            - success
            - code
          properties:
            code:
              type: string
              enum:
                [
                  'COMMON_INTERNAL_SERVER_ERROR',
                  'AUTH_INVALID_TOKEN',
                  'SETTINGS_VALIDATION_FAILED',
                  'SSH_VALIDATION_FAILED',
                  'SSH_SERVER_CONFLICT',
                  'SSH_FOLDER_CONFLICT',
                  'SSH_TAG_CONFLICT',
                  'SSH_KEYCHAIN_CONFLICT',
                  'SSH_NOT_FOUND',
                  'SSH_HOST_UNTRUSTED',
                  'SSH_SESSION_NOT_FOUND',
                  'SSH_KEYCHAIN_IN_USE',
                  'AUDIT_VALIDATION_FAILED',
                  'AUDIT_EVENT_NOT_FOUND',
                  'LOCAL_TERMINAL_VALIDATION_FAILED',
                  'LOCAL_TERMINAL_PROFILE_NOT_FOUND',
                ]
            success:
              type: boolean
              enum: [false]
    SshAuthType:
      type: string
      enum: ['password', 'key', 'both']
    SshKeychainVisibility:
      type: string
      enum: ['hidden', 'shared']
    TestPingData:
      type: object
      required:
        - service
        - mode
        - authenticated
        - capabilities
      properties:
        service:
          type: string
