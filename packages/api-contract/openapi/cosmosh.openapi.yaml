      summary: Create SSH keychain.
      operationId: sshCreateKeychain
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshKeychainCreateRequest'
      responses:
        '200':
          description: SSH keychain created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshKeychainCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
