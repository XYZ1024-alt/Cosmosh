openapi: 3.0.3
info:
  title: Cosmosh Local API
  version: 0.1.0
  description: |
    Internal local API used by Cosmosh. In Electron runtime, requests must be proxied by main process.
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: '3000'
security:
  - CosmoshInternalToken: []
paths:
  /api/health:
    get:
      tags:
        - system
      summary: Backend liveness check.
      operationId: health
      security: []
      responses:
        '200':
          description: Backend service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/test/ping:
    get:
      tags:
        - test
      summary: Connectivity smoke test for renderer -> main -> backend chain.
      operationId: testPing
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Successful ping response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestPingSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/settings:
    get:
      tags:
        - settings
      summary: Get application settings.
      operationId: settingsGet
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Settings fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsGetSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - settings
      summary: Update application settings.
      operationId: settingsUpdate
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdateRequest'
      responses:
        '200':
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsUpdateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/audit/events:
    get:
      tags:
        - audit
      summary: List audit events.
      operationId: auditListEvents
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: startAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: endAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: outcome
          in: query
          required: false
          schema:
            type: string
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: entityId
          in: query
          required: false
          schema:
            type: string
        - name: keyword
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Audit events listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/audit/events/{eventId}:
    get:
      tags:
        - audit
      summary: Get one audit event detail.
      operationId: auditGetEventById
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit event detail fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventDetailSuccess'
        '404':
          description: Audit event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/servers:
    get:
      tags:
        - ssh
      summary: List SSH servers.
      operationId: sshListServers
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: SSH servers listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - ssh
      summary: Create SSH server configuration.
      operationId: sshCreateServer
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshServerCreateRequest'
      responses:
        '200':
          description: SSH server created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict with existing server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/servers/{serverId}:
    put:
      tags:
        - ssh
      summary: Update SSH server configuration.
      operationId: sshUpdateServer
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshServerCreateRequest'
      responses:
        '200':
          description: SSH server updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerUpdateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict with existing server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - ssh
      summary: Delete SSH server configuration.
      operationId: sshDeleteServer
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: SSH server deleted.
        '404':
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/servers/{serverId}/credentials:
    get:
      tags:
        - ssh
      summary: Get SSH server credentials for editor form prefill.
      operationId: sshGetServerCredentials
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSH server credentials fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerCredentialsSuccess'
        '404':
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/keychains:
