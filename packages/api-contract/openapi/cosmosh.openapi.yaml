components:
  securitySchemes:
    CosmoshInternalToken:
      type: apiKey
      in: header
      name: x-cosmosh-internal-token
  parameters:
    LocaleHeader:
      name: x-cosmosh-locale
      in: header
      required: false
      schema:
        type: string
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum: ['ok']
        timestamp:
          type: string
          format: date-time
    ApiMeta:
      type: object
      required:
        - code
        - message
        - requestId
        - timestamp
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time
    ApiError:
      allOf:
        - $ref: '#/components/schemas/ApiMeta'
        - type: object
          required:
            - success
            - code
          properties:
            code:
              type: string
              enum:
                [
                  'COMMON_INTERNAL_SERVER_ERROR',
                  'AUTH_INVALID_TOKEN',
                  'SETTINGS_VALIDATION_FAILED',
                  'SSH_VALIDATION_FAILED',
                  'SSH_SERVER_CONFLICT',
                  'SSH_FOLDER_CONFLICT',
                  'SSH_TAG_CONFLICT',
                  'SSH_KEYCHAIN_CONFLICT',
                  'SSH_NOT_FOUND',
                  'SSH_HOST_UNTRUSTED',
                  'SSH_SESSION_NOT_FOUND',
                  'SSH_KEYCHAIN_IN_USE',
                  'SFTP_SESSION_NOT_FOUND',
                  'SFTP_TRANSFER_NOT_FOUND',
                  'SFTP_VALIDATION_FAILED',
                  'SFTP_OPERATION_FAILED',
                  'SFTP_UPLOAD_CONFLICT',
                  'AUDIT_VALIDATION_FAILED',
                  'AUDIT_EVENT_NOT_FOUND',
                  'LOCAL_TERMINAL_VALIDATION_FAILED',
                  'LOCAL_TERMINAL_PROFILE_NOT_FOUND',
                  'PORT_FORWARD_VALIDATION_FAILED',
                  'PORT_FORWARD_RULE_NOT_FOUND',
                  'PORT_FORWARD_RULE_ACTIVE',
                  'PORT_FORWARD_START_FAILED',
                  'PORT_FORWARD_STOP_FAILED',
                ]
            success:
              type: boolean
              enum: [false]
    SshAuthType:
      type: string
      enum: ['password', 'key', 'both']
    SshKeychainVisibility:
      type: string
      enum: ['hidden', 'shared']
    TestPingData:
      type: object
      required:
        - service
        - mode
        - authenticated
        - capabilities
      properties:
        service:
          type: string
          enum: ['cosmosh-backend']
        mode:
          type: string
          enum: ['electron-main', 'standalone']
        authenticated:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
            enum: ['ssh', 'sftp', 'port-forward']
          minItems: 3
          maxItems: 3
    TestPingSuccess:
      allOf:
        - $ref: '#/components/schemas/ApiMeta'
        - type: object
          required:
            - success
            - data
            - code
          properties:
            code:
              type: string
              enum: ['TEST_PING_OK']
            success:
              type: boolean
              enum: [true]
            data:
              $ref: '#/components/schemas/TestPingData'
    RuntimeActiveConnectionsData:
      type: object
      required:
        - sshCount
        - sftpCount
        - totalCount
      properties:
        sshCount:
          type: integer
          minimum: 0
        sftpCount:
          type: integer
          minimum: 0
        totalCount:
          type: integer
          minimum: 0
    RuntimeActiveConnectionsGetSuccess:
      allOf:
        - $ref: '#/components/schemas/ApiMeta'
        - type: object
          required:
            - success
            - data
            - code
          properties:
            code:
              type: string
              enum: ['RUNTIME_ACTIVE_CONNECTIONS_GET_OK']
            success:
              type: boolean
