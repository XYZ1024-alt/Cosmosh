openapi: 3.0.3
info:
  title: Cosmosh Local API
  version: 0.1.0
  description: |
    Internal local API used by Cosmosh. In Electron runtime, requests must be proxied by main process.
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: '3000'
security:
  - CosmoshInternalToken: []
paths:
  /api/health:
    get:
      tags:
        - system
      summary: Backend liveness check.
      operationId: health
      security: []
      responses:
        '200':
          description: Backend service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/test/ping:
    get:
      tags:
        - test
      summary: Connectivity smoke test for renderer -> main -> backend chain.
      operationId: testPing
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Successful ping response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestPingSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/runtime/active-connections:
    get:
      tags:
        - runtime
      summary: Get active SSH and SFTP connection counts.
      operationId: runtimeGetActiveConnections
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Active connection counts returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeActiveConnectionsGetSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - runtime
      summary: Close all active SSH and SFTP connections.
      operationId: runtimeCloseActiveConnections
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Active SSH and SFTP connections closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeActiveConnectionsCloseSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/settings:
    get:
      tags:
        - settings
      summary: Get application settings.
      operationId: settingsGet
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: Settings fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsGetSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - settings
      summary: Update application settings.
      operationId: settingsUpdate
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdateRequest'
      responses:
        '200':
          description: Settings updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsUpdateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/audit/events:
    get:
      tags:
        - audit
      summary: List audit events.
      operationId: auditListEvents
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - name: startAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: endAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: outcome
          in: query
          required: false
          schema:
            type: string
        - name: entityType
          in: query
          required: false
          schema:
            type: string
        - name: entityId
          in: query
          required: false
          schema:
            type: string
        - name: keyword
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Audit events listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/audit/events/{eventId}:
    get:
      tags:
        - audit
      summary: Get one audit event detail.
      operationId: auditGetEventById
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: eventId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Audit event detail fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventDetailSuccess'
        '404':
          description: Audit event not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/servers:
    get:
      tags:
        - ssh
      summary: List SSH servers.
      operationId: sshListServers
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: SSH servers listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - ssh
      summary: Create SSH server configuration.
      operationId: sshCreateServer
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshServerCreateRequest'
      responses:
        '200':
          description: SSH server created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict with existing server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/servers/{serverId}:
    put:
      tags:
        - ssh
      summary: Update SSH server configuration.
      operationId: sshUpdateServer
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshServerCreateRequest'
      responses:
        '200':
          description: SSH server updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerUpdateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict with existing server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - ssh
      summary: Delete SSH server configuration.
      operationId: sshDeleteServer
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: SSH server deleted.
        '404':
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/servers/{serverId}/credentials:
    get:
      tags:
        - ssh
      summary: Get SSH server credentials for editor form prefill.
      operationId: sshGetServerCredentials
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: serverId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSH server credentials fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshServerCredentialsSuccess'
        '404':
          description: SSH server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/keychains:
    get:
      tags:
        - ssh
      summary: List SSH keychains.
      operationId: sshListKeychains
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: SSH keychains listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshKeychainListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - ssh
      summary: Create SSH keychain.
      operationId: sshCreateKeychain
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshKeychainCreateRequest'
      responses:
        '200':
          description: SSH keychain created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshKeychainCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict with existing keychain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/keychains/{keychainId}:
    put:
      tags:
        - ssh
      summary: Update SSH keychain.
      operationId: sshUpdateKeychain
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: keychainId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshKeychainUpdateRequest'
      responses:
        '200':
          description: SSH keychain updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshKeychainUpdateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: SSH keychain not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - ssh
      summary: Delete SSH keychain.
      operationId: sshDeleteKeychain
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: keychainId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: SSH keychain deleted.
        '404':
          description: SSH keychain not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: SSH keychain is in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/keychains/{keychainId}/credentials:
    get:
      tags:
        - ssh
      summary: Get SSH keychain credentials for editor form prefill.
      operationId: sshGetKeychainCredentials
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: keychainId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSH keychain credentials fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshKeychainCredentialsSuccess'
        '404':
          description: SSH keychain not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/folders:
    get:
      tags:
        - ssh
      summary: List SSH folders.
      operationId: sshListFolders
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: SSH folders listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshFolderListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - ssh
      summary: Create SSH folder.
      operationId: sshCreateFolder
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshFolderCreateRequest'
      responses:
        '200':
          description: SSH folder created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshFolderCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Folder already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/folders/{folderId}:
    put:
      tags:
        - ssh
      summary: Update SSH folder.
      operationId: sshUpdateFolder
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshFolderUpdateRequest'
      responses:
        '200':
          description: SSH folder updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshFolderUpdateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: SSH folder not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Folder already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - ssh
      summary: Delete SSH folder.
      operationId: sshDeleteFolder
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: SSH folder deleted.
        '404':
          description: SSH folder not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/tags:
    get:
      tags:
        - ssh
      summary: List SSH tags.
      operationId: sshListTags
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: SSH tags listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshTagListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - ssh
      summary: Create SSH tag.
      operationId: sshCreateTag
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshTagCreateRequest'
      responses:
        '200':
          description: SSH tag created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshTagCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Tag already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/sessions:
    post:
      tags:
        - ssh
      summary: Create a live SSH terminal session.
      operationId: sshCreateSession
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshSessionCreateRequest'
      responses:
        '200':
          description: SSH session is ready for websocket streaming.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshSessionCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Host fingerprint is not trusted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshHostVerificationRequired'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/sessions/{sessionId}:
    delete:
      tags:
        - ssh
      summary: Close a live SSH terminal session.
      operationId: sshCloseSession
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session closed.
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/trusted-host-keys:
    post:
      tags:
        - ssh
      summary: Trust a host fingerprint for a server.
      operationId: sshTrustFingerprint
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshTrustFingerprintRequest'
      responses:
        '200':
          description: Host fingerprint has been trusted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshTrustFingerprintSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/sftp/sessions:
    post:
      tags:
        - sftp
      summary: Create an SFTP file-system session.
      operationId: sftpCreateSession
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SftpSessionCreateRequest'
      responses:
        '200':
          description: SFTP session is ready for file-system operations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SftpSessionCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Server not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Host fingerprint is not trusted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshHostVerificationRequired'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/sftp/sessions/{sessionId}/entries:
    get:
      tags:
        - sftp
      summary: List entries in one remote SFTP directory.
      operationId: sftpListDirectory
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: path
          in: query
          required: false
          schema:
            type: string
            default: .
      responses:
        '200':
          description: Directory entries listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SftpDirectoryListSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Session or directory not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/sftp/sessions/{sessionId}/entries/details:
    post:
      tags:
        - sftp
      summary: Get detailed metadata for selected remote SFTP entries.
      operationId: sftpGetEntryDetails
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SftpEntryDetailsRequest'
      responses:
        '200':
          description: Detailed entry metadata fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SftpEntryDetailsSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
