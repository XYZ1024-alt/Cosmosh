        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: SSH keychain not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - ssh
      summary: Delete SSH keychain.
      operationId: sshDeleteKeychain
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: keychainId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: SSH keychain deleted.
        '404':
          description: SSH keychain not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: SSH keychain is in use.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/keychains/{keychainId}/credentials:
    get:
      tags:
        - ssh
      summary: Get SSH keychain credentials for editor form prefill.
      operationId: sshGetKeychainCredentials
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: keychainId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSH keychain credentials fetched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshKeychainCredentialsSuccess'
        '404':
          description: SSH keychain not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/folders:
    get:
      tags:
        - ssh
      summary: List SSH folders.
      operationId: sshListFolders
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: SSH folders listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshFolderListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - ssh
      summary: Create SSH folder.
      operationId: sshCreateFolder
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshFolderCreateRequest'
      responses:
        '200':
          description: SSH folder created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshFolderCreateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Folder already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/folders/{folderId}:
    put:
      tags:
        - ssh
      summary: Update SSH folder.
      operationId: sshUpdateFolder
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshFolderUpdateRequest'
      responses:
        '200':
          description: SSH folder updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshFolderUpdateSuccess'
        '400':
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: SSH folder not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Folder already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - ssh
      summary: Delete SSH folder.
      operationId: sshDeleteFolder
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
        - name: folderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: SSH folder deleted.
        '404':
          description: SSH folder not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/ssh/tags:
    get:
      tags:
        - ssh
      summary: List SSH tags.
      operationId: sshListTags
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      responses:
        '200':
          description: SSH tags listed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshTagListSuccess'
        '401':
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - ssh
      summary: Create SSH tag.
      operationId: sshCreateTag
      parameters:
        - $ref: '#/components/parameters/LocaleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshTagCreateRequest'
      responses:
        '200':
          description: SSH tag created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshTagCreateSuccess'
        '400':
